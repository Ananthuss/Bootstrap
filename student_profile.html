<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Profile and Grades</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<style>
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background-color: #f4f6f8;
    padding: 40px 15px;
  }
  .profile-section {
    max-width: 650px;
    margin: 0 auto;
    background: #ffffff;
    padding: 35px 30px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    text-align: center;
  }
  h1.profile-heading {
    font-size: 2.5rem;
    font-weight: 700;
    color: #1f2d3d;
    margin-bottom: 20px;
  }
  blockquote.motto {
    font-style: italic;
    font-size: 1.15rem;
    color: #555;
    border-left: 4px solid #4a90d9;
    padding-left: 15px;
    margin: 0 auto 25px auto;
    max-width: 450px;
    text-align: left;
  }
  .profile-img {
    width: 150px;
    height: 150px;
    object-fit: cover;
    border-radius: 50%;
    border: 4px solid #4a90d9;
    margin-bottom: 25px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  table.grades-table {
    text-align: left;
  }
  table.grades-table thead th {
    background-color: #212529;
    color: #ffffff;
  }
</style>
</head>
<body>

<div class="profile-section">

  <h1 class="profile-heading">Student Profile</h1>

  <blockquote class="motto">
    "Learning never exhausts the mind."
  </blockquote>

  <img src="https://placehold.co/300x300/4a90d9/ffffff?text=Student" alt="Student Profile Photo" class="profile-img">

  <table class="table table-striped grades-table">
    <thead>
      <tr>
        <th scope="col">Subject</th>
        <th scope="col">Marks Scored</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Mathematics</td>
        <td>92</td>
      </tr>
      <tr>
        <td>Science</td>
        <td>88</td>
      </tr>
      <tr>
        <td>English</td>
        <td>95</td>
      </tr>
    </tbody>
  </table>

  <div class="alert alert-success mt-3" role="alert">
    Profile updated successfully!
  </div>

</div>

</body>
</html>
